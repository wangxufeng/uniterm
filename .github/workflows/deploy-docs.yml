name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/guide/**'
      - 'docs/index.html'
      - 'docs/imgs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/guide/package-lock.json

      - name: Install dependencies
        run: cd docs/guide && npm ci

      - name: Build VitePress
        run: cd docs/guide && npm run docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare artifact
        run: |
          mkdir -p _site
          # Landing page
          cp docs/index.html _site/
          cp -r docs/imgs _site/imgs
          cp docs/CNAME _site/CNAME 2>/dev/null || true
          cp docs/.nojekyll _site/.nojekyll 2>/dev/null || true
          # VitePress output goes under /guide/
          cp -r docs/guide/.vitepress/dist _site/guide

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
