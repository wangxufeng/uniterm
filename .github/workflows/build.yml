name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            slug: windows-amd64
            artifact: uniTerm.exe
          - os: ubuntu-24.04
            platform: linux/amd64
            slug: linux-amd64
            artifact: uniTerm
          - os: ubuntu-24.04-arm64
            platform: linux/arm64
            slug: linux-arm64
            artifact: uniTerm
          - os: macos-latest
            platform: darwin/universal
            slug: darwin-universal
            artifact: uniTerm.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space (macOS)
        if: matrix.platform == 'darwin/universal'
        run: |
          sudo rm -rf /Library/Developer/CoreSimulator
          sudo rm -rf /Applications/Xcode_*.app 2>/dev/null || true
          df -h /

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Set version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "VERSION=dev-${SHORT}" >> $GITHUB_ENV
          fi

      - name: Install and build frontend
        env:
          VITE_VERSION: ${{ env.VERSION }}
        run: cd frontend && npm install && npm run build

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install NSIS and UPX (Windows)
        if: matrix.platform == 'windows/amd64'
        shell: bash
        run: |
          choco install nsis upx -y
          NSIS_BIN="/c/Program Files (x86)/NSIS/Bin"
          if [ ! -f "$NSIS_BIN/makensis.exe" ]; then echo "ERROR: makensis.exe not found at $NSIS_BIN"; exit 1; fi
          echo "makensis: $NSIS_BIN/makensis.exe"
          upx --version

      - name: Install UPX (Linux)
        if: startsWith(matrix.platform, 'linux')
        run: sudo apt-get install -y upx

      - name: Build
        shell: bash
        run: |
          PLATFORM="${{ matrix.platform }}"

          if [ "$PLATFORM" = "windows/amd64" ]; then
            export PATH="/c/Program Files (x86)/NSIS/Bin:$PATH"
          fi
          echo "PATH=$PATH"

          BUILD_ARGS="-platform $PLATFORM -ldflags \"-s -w -X main.Version=${{ env.VERSION }}\" -skipbindings"

          if [ "$PLATFORM" = "windows/amd64" ]; then
            BUILD_ARGS="$BUILD_ARGS -nsis"
          fi

          if [ "$PLATFORM" = "windows/amd64" ] || [ "${PLATFORM%/*}" = "linux" ]; then
            BUILD_ARGS="$BUILD_ARGS -upx -upxflags=\"--best --lzma\""
          fi

          if [ "${PLATFORM%/*}" = "linux" ]; then
            BUILD_ARGS="$BUILD_ARGS -tags webkit2_41"
          fi

          echo "BUILD_ARGS=$BUILD_ARGS"
          eval wails build $BUILD_ARGS

      - name: Fix macOS permissions and sign
        if: matrix.platform == 'darwin/universal'
        run: |
          chmod +x build/bin/uniTerm.app/Contents/MacOS/uniTerm
          codesign --force --deep --sign - build/bin/uniTerm.app

      - name: Package (macOS)
        if: matrix.platform == 'darwin/universal'
        run: |
          cd build/bin
          mkdir -p dmg_staging
          cp -R uniTerm.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname uniTerm -srcfolder dmg_staging -ov -format UDZO ../../uniterm-darwin-universal-${VERSION}.dmg
          rm -rf dmg_staging

      - name: Package Windows portable
        if: matrix.platform == 'windows/amd64'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist_tmp | Out-Null
          Copy-Item build/bin/uniTerm.exe dist_tmp/
          $VERSION = "${{ env.VERSION }}"
          Push-Location dist_tmp
          Compress-Archive -Path uniTerm.exe -DestinationPath "../uniterm-windows-amd64-portable-${VERSION}.zip" -Force
          Pop-Location
          Remove-Item -Recurse -Force dist_tmp

      - name: Rename NSIS installer (Windows)
        if: matrix.platform == 'windows/amd64'
        shell: bash
        run: mv build/bin/uniTerm-amd64-installer.exe "uniterm-windows-amd64-installer-$VERSION.exe"

      - name: Package (Linux)
        if: startsWith(matrix.platform, 'linux')
        run: |
          ARCH=${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          NFPM_ARCH=${{ matrix.platform == 'linux/amd64' && 'x86_64' || 'arm64' }}

          cd build/bin
          chmod +x uniTerm

          # tar.gz
          tar czf ../../uniterm-linux-${ARCH}-${VERSION}.tar.gz uniTerm

          # nfpm for deb + rpm
          cd ../..
          NFPM_VER="2.46.3"
          curl -sSfL -o /tmp/nfpm.tar.gz \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_Linux_${NFPM_ARCH}.tar.gz"
          tar xf /tmp/nfpm.tar.gz -C /usr/local/bin nfpm
          chmod +x /usr/local/bin/nfpm
          nfpm --version

          cat > nfpm.yaml << EOF
          name: uniterm
          arch: ${ARCH}
          platform: linux
          version: ${VERSION}
          maintainer: uniTerm <uniTerm@example.com>
          description: Lightweight all-in-one terminal emulator with built-in AI Agent
          homepage: https://uniterm.net
          license: Proprietary
          depends:
            - libgtk-3-0
            - libwebkit2gtk-4.1-0
          contents:
            - src: build/bin/uniTerm
              dst: /usr/bin/uniterm
            - src: build/linux/uniterm.desktop
              dst: /usr/share/applications/uniterm.desktop
            - src: build/appicon.png
              dst: /usr/share/icons/hicolor/128x128/apps/uniterm.png
          EOF

          nfpm package --config nfpm.yaml --packager deb \
            --target "uniterm_${VERSION}_${ARCH}.deb"
          nfpm package --config nfpm.yaml --packager rpm \
            --target "uniterm-${VERSION}.${ARCH}.rpm"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uniTerm-${{ matrix.slug }}
          path: |
            uniterm-*.zip
            uniterm-*.tar.gz
            uniterm-*.exe
            uniterm-*.dmg
            uniterm_*.deb
            uniterm-*.rpm

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.exe' -o -name '*.dmg' -o -name '*.deb' -o -name '*.rpm' \) -exec mv {} . \;
          ls -la uniterm-*

      - name: Extract changelog
        run: sed -n "/^## ${{ github.ref_name }}$/,/^## v/p" CHANGELOG.md | sed '$d' > release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          body_path: release_body.md
          files: |
            uniterm-*.zip
            uniterm-*.tar.gz
            uniterm-*.exe
            uniterm-*.dmg
            uniterm_*.deb
            uniterm-*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
